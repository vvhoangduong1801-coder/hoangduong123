<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sheep Letter - Gửi Phương thân yêu</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #f5ede0, #faf3e8, #ede8d8);
  font-family: 'Courier New', Courier, monospace;
  overflow: hidden;
}

h2 { color: #8d734a; margin-bottom: 5px; transition: 0.5s; }
#hint { color: #b5a381; margin-bottom: 20px; transition: 0.5s; }

/* Envelope */
.envelope {
  width: 280px;
  height: 180px;
  position: relative;
  cursor: pointer;
  transition: transform 0.3s, opacity 0.8s, top 0.8s;
  z-index: 10;
}

.envelope:hover { transform: scale(1.05); }

/* Hiệu ứng bao thư rơi */
.envelope.fall {
  top: 500px;
  opacity: 0;
  pointer-events: none;
}

.body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #f0dfc0;
  border: 2px solid #c9a870;
  border-radius: 10px;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 90px;
  background: #e4c98e;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  border-bottom: 2px solid #c9a870;
}

/* Sheep */
.sheep {
  position: absolute;
  font-size: 1.6rem;
  /* Dùng cubic-bezier để tạo cảm giác cừu chạy rồi khựng lại tự nhiên */
  transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  user-select: none;
  z-index: 5;
}

.jumping {
  animation: jump 0.6s infinite ease-in-out;
}

@keyframes jump {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-12px) rotate(5deg); }
}

</style>
</head>

<body>

<h2 id="title">Gửi Phương thân yêu 💌</h2>
<p id="hint">Mở thư để nhận điều bất ngờ...</p>

<div class="envelope" id="envelope" onclick="openEnvelope()">
  <div class="body"></div>
  <div class="flap"></div>
</div>

<div id="sheepContainer"></div>

<script>
let opened = false;

// Tọa độ chữ PHƯƠNG BÉO
const nameMap = [
    // P
    {x:0, y:0}, {x:1, y:0}, {x:2, y:0}, {x:0, y:1}, {x:2, y:1}, {x:0, y:2}, {x:1, y:2}, {x:2, y:2}, {x:0, y:3}, {x:0, y:4},
    // H
    {x:4, y:0}, {x:4, y:1}, {x:4, y:2}, {x:4, y:3}, {x:4, y:4}, {x:5, y:2}, {x:6, y:0}, {x:6, y:1}, {x:6, y:2}, {x:6, y:3}, {x:6, y:4},
    // U (ư)
    {x:8, y:0}, {x:8, y:1}, {x:8, y:2}, {x:8, y:3}, {x:9, y:4}, {x:10, y:4}, {x:11, y:0}, {x:11, y:1}, {x:11, y:2}, {x:11, y:3}, {x:11, y:4}, {x:12, y:0},
    // O (ơ)
    {x:14, y:1}, {x:14, y:2}, {x:14, y:3}, {x:15, y:0}, {x:16, y:0}, {x:17, y:1}, {x:17, y:2}, {x:17, y:3}, {x:16, y:4}, {x:15, y:4}, {x:18, y:0},
    // N
    {x:20, y:0}, {x:20, y:1}, {x:20, y:2}, {x:20, y:3}, {x:20, y:4}, {x:21, y:1}, {x:22, y:2}, {x:23, y:3}, {x:24, y:0}, {x:24, y:1}, {x:24, y:2}, {x:24, y:3}, {x:24, y:4},
    // G
    {x:27, y:1}, {x:27, y:2}, {x:27, y:3}, {x:28, y:0}, {x:29, y:0}, {x:30, y:0}, {x:28, y:4}, {x:29, y:4}, {x:30, y:4}, {x:30, y:2}, {x:29, y:2},

    // B (Dòng dưới)
    {x:6, y:8}, {x:6, y:9}, {x:6, y:10}, {x:6, y:11}, {x:6, y:12}, {x:7, y:8}, {x:8, y:8}, {x:9, y:9}, {x:7, y:10}, {x:8, y:10}, {x:9, y:11}, {x:8, y:12}, {x:7, y:12},
    // E (é)
    {x:11, y:8}, {x:11, y:9}, {x:11, y:10}, {x:11, y:11}, {x:11, y:12}, {x:12, y:8}, {x:13, y:8}, {x:12, y:10}, {x:13, y:10}, {x:12, y:12}, {x:13, y:12}, {x:13, y:7},
    // O
    {x:15, y:9}, {x:15, y:10}, {x:15, y:11}, {x:16, y:8}, {x:17, y:8}, {x:18, y:9}, {x:18, y:10}, {x:18, y:11}, {x:17, y:12}, {x:16, y:12}
];

function openEnvelope() {
  if (opened) return;
  opened = true;

  const env = document.getElementById("envelope");
  const container = document.getElementById("sheepContainer");
  const title = document.getElementById("title");
  const hint = document.getElementById("hint");
  
  // 1. Bao thư rơi xuống và biến mất
  env.classList.add("fall");
  title.style.opacity = "0";
  hint.innerText = "🐑 Đang dàn quân...";

  const startX = window.innerWidth / 2;
  const startY = window.innerHeight / 2;
  
  const spacing = 22; 
  const offsetX = (window.innerWidth - (30 * spacing)) / 2;
  const offsetY = (window.innerHeight - (13 * spacing)) / 2;

  nameMap.forEach((pos, index) => {
    // Tạo cừu chậm rãi từng con để thấy hiệu ứng tràn ra
    setTimeout(() => {
      const s = document.createElement("div");
      s.className = "sheep jumping";
      s.innerText = Math.random() > 0.5 ? "🐑" : "🐏";
      
      // Bắt đầu từ vị trí bao thư
      s.style.left = startX + "px";
      s.style.top = startY + "px";
      s.style.opacity = "0";
      
      container.appendChild(s);

      // Nhịp 1: Cừu bay ra, tản ra vòng tròn xung quanh
      setTimeout(() => {
        const angle = Math.random() * Math.PI * 2;
        const radius = 250 + Math.random() * 100;
        s.style.opacity = "1";
        s.style.left = (startX + Math.cos(angle) * radius) + "px";
        s.style.top = (startY + Math.sin(angle) * radius) + "px";
      }, 50);

      // Nhịp 2: Sau khi chạy 1 vòng (1.2 giây sau), chạy về xếp thành chữ
      setTimeout(() => {
        s.style.left = (offsetX + pos.x * spacing) + "px";
        s.style.top = (offsetY + pos.y * spacing) + "px";
        s.style.fontSize = "1.3rem"; // Thu nhỏ lại một chút để chữ nét hơn
        
        // Khi đã về vị trí, đổi tiêu đề
        if(index === nameMap.length - 1) {
            title.innerText = "🐑 Xong rồi nè! 🐏";
            title.style.opacity = "1";
            hint.innerText = "Dành riêng cho Phương Béo";
        }
      }, 1500);
      
      s.style.animationDuration = (0.5 + Math.random() * 0.3) + "s";
    }, index * 15); 
  });
}
</script>

</body>
</html>
