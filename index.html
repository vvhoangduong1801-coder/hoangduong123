<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sheep Letter - Gửi Phương thân yêu</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #f5ede0, #faf3e8, #ede8d8);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden;
  position: relative;
}

/* Khu vực tiêu đề cố định ở trên */
.header-zone {
  width: 100%;
  padding: 20px 0;
  height: 12vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  background: rgba(250, 243, 232, 0.9);
  border-bottom: 1px solid #e2d1b3;
}

h2 { color: #8d734a; margin: 0; font-size: 1.5rem; }
#hint { color: #b5a381; margin-top: 5px; font-size: 0.9rem; }

/* Bao thư */
.envelope {
  width: 260px;
  height: 170px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: all 0.8s cubic-bezier(0.5, -0.5, 0.5, 1.5);
  z-index: 10;
}

.envelope.fall {
  top: 150%;
  opacity: 0;
}

.body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #f0dfc0;
  border: 2px solid #c9a870;
  border-radius: 12px;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 85px;
  background: #e4c98e;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  border-bottom: 2px solid #c9a870;
}

/* Container cho cừu */
#sheepContainer {
  width: 100vw;
  height: 88vh;
  position: absolute;
  bottom: 0;
  left: 0;
  z-index: 5;
}

.sheep {
  position: absolute;
  font-size: 1.2rem;
  transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
  user-select: none;
  opacity: 0;
}

.jumping {
  animation: jump 0.8s infinite ease-in-out;
}

@keyframes jump {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<div class="header-zone">
  <h2 id="title">Gửi Phương thân yêu 💌</h2>
  <p id="hint">Chạm vào bao thư để mở nhé</p>
</div>

<div class="envelope" id="envelope" onclick="openEnvelope()">
  <div class="body"></div>
  <div class="flap"></div>
</div>

<div id="sheepContainer"></div>

<script>
let opened = false;
const TOTAL_SHEEP = 250; // Số lượng cừu vừa phải

function openEnvelope() {
  if (opened) return;
  opened = true;

  const env = document.getElementById("envelope");
  const container = document.getElementById("sheepContainer");
  const title = document.getElementById("title");
  const hint = document.getElementById("hint");
  
  env.classList.add("fall");
  hint.innerText = "🐑 Đợi một chút nha...";

  // Lấy tọa độ chữ "Phương béo"
  const coords = generateTextCoordinates("Phương béo", container.offsetWidth, container.offsetHeight);

  const startX = container.offsetWidth / 2;
  const startY = container.offsetHeight / 2;

  for (let i = 0; i < TOTAL_SHEEP; i++) {
    setTimeout(() => {
      const s = document.createElement("div");
      s.className = "sheep jumping";
      s.innerText = Math.random() > 0.3 ? "🐑" : "🐏";
      
      s.style.left = startX + "px";
      s.style.top = startY + "px";
      container.appendChild(s);

      // Nhịp 1: Chạy tản ra vòng tròn
      setTimeout(() => {
        const angle = Math.random() * Math.PI * 2;
        const radius = 200 + Math.random() * 100;
        s.style.opacity = "1";
        s.style.left = (startX + Math.cos(angle) * radius) + "px";
        s.style.top = (startY + Math.sin(angle) * radius) + "px";
      }, 50);

      // Nhịp 2: Xếp thành chữ
      setTimeout(() => {
        const pos = coords[Math.floor(Math.random() * coords.length)];
        s.style.left = pos.x + "px";
        s.style.top = pos.y + "px";
        
        if(i === TOTAL_SHEEP - 1) {
            title.innerText = "🐑 Xong rồi nè! 🐏";
            hint.innerText = "Dành riêng cho Phương béo";
        }
      }, 1500);
      
      s.style.animationDuration = (0.6 + Math.random() * 0.4) + "s";
    }, i * 5);
  }
}

function generateTextCoordinates(text, width, height) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = width;
    canvas.height = height;

    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, width, height);

    ctx.fillStyle = "black";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    
    // Tự động điều chỉnh cỡ chữ theo màn hình
    const fontSize = Math.min(width * 0.12, 100);
    ctx.font = `bold ${fontSize}px Arial`;
    ctx.fillText(text, width / 2, height / 2);

    const imgData = ctx.getImageData(0, 0, width, height).data;
    const points = [];
    const step = 8; // Khoảng cách giữa các điểm (tăng để ít cừu hơn)

    for (let y = 0; y < height; y += step) {
        for (let x = 0; x < width; x += step) {
            if (imgData[(y * width + x) * 4] < 128) {
                points.push({ x, y });
            }
        }
    }
    return points;
}
</script>

</body>
</html>
