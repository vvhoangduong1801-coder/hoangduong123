<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sheep Letter - Phương Béo</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #f5ede0, #faf3e8, #ede8d8);
  font-family: 'Courier New', Courier, monospace;
  overflow: hidden;
}

h2 { color: #8d734a; margin-bottom: 5px; }
#hint { color: #b5a381; margin-bottom: 20px; }

/* Envelope */
.envelope {
  width: 280px;
  height: 180px;
  position: relative;
  cursor: pointer;
  transition: 0.3s;
  z-index: 10;
}

.envelope:hover { transform: scale(1.05); }

.body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #f0dfc0;
  border: 2px solid #c9a870;
  border-radius: 10px;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 90px;
  background: #e4c98e;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  border-bottom: 2px solid #c9a870;
  transition: 0.5s;
  z-index: 2;
}

.envelope.open .flap {
  transform: rotateX(180deg);
  transform-origin: top;
  z-index: 0;
}

/* Sheep */
.sheep {
  position: absolute;
  font-size: 1.5rem;
  transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
  user-select: none;
}

.jumping {
  animation: jump 0.8s infinite ease-in-out;
}

@keyframes jump {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.letter-content {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 20px;
  opacity: 1;
  transition: 0.5s;
}
</style>
</head>

<body>

<h2>Gửi Phương Béo 🐑</h2>
<p id="hint">Chạm vào bao thư để triệu hồi đàn cừu</p>

<div class="envelope" id="envelope" onclick="openEnvelope()">
  <div class="body"></div>
  <div class="flap"></div>
  <div id="letter" class="letter-content">💌</div>
</div>

<div id="sheepContainer"></div>

<script>
let opened = false;

// Bản đồ tọa độ cho chữ PHƯƠNG BÉO (x, y)
// Đơn vị là ô lưới để dễ căn chỉnh
const nameMap = [
    // P
    {x:0, y:0}, {x:1, y:0}, {x:2, y:0}, {x:0, y:1}, {x:2, y:1}, {x:0, y:2}, {x:1, y:2}, {x:2, y:2}, {x:0, y:3}, {x:0, y:4},
    // H
    {x:4, y:0}, {x:4, y:1}, {x:4, y:2}, {x:4, y:3}, {x:4, y:4}, {x:5, y:2}, {x:6, y:0}, {x:6, y:1}, {x:6, y:2}, {x:6, y:3}, {x:6, y:4},
    // U (có dấu ư)
    {x:8, y:0}, {x:8, y:1}, {x:8, y:2}, {x:8, y:3}, {x:9, y:4}, {x:10, y:4}, {x:11, y:0}, {x:11, y:1}, {x:11, y:2}, {x:11, y:3}, {x:11, y:4}, {x:12, y:0},
    // O (có dấu ơ)
    {x:14, y:1}, {x:14, y:2}, {x:14, y:3}, {x:15, y:0}, {x:16, y:0}, {x:17, y:1}, {x:17, y:2}, {x:17, y:3}, {x:16, y:4}, {x:15, y:4}, {x:18, y:0},
    // N
    {x:20, y:0}, {x:20, y:1}, {x:20, y:2}, {x:20, y:3}, {x:20, y:4}, {x:21, y:1}, {x:22, y:2}, {x:23, y:3}, {x:24, y:0}, {x:24, y:1}, {x:24, y:2}, {x:24, y:3}, {x:24, y:4},
    // G
    {x:27, y:1}, {x:27, y:2}, {x:27, y:3}, {x:28, y:0}, {x:29, y:0}, {x:30, y:0}, {x:28, y:4}, {x:29, y:4}, {x:30, y:4}, {x:30, y:2}, {x:29, y:2},

    // B (Dòng dưới)
    {x:6, y:7}, {x:6, y:8}, {x:6, y:9}, {x:6, y:10}, {x:6, y:11}, {x:7, y:7}, {x:8, y:7}, {x:9, y:8}, {x:7, y:9}, {x:8, y:9}, {x:9, y:10}, {x:8, y:11}, {x:7, y:11},
    // E (có dấu sắc)
    {x:11, y:7}, {x:11, y:8}, {x:11, y:9}, {x:11, y:10}, {x:11, y:11}, {x:12, y:7}, {x:13, y:7}, {x:12, y:9}, {x:13, y:9}, {x:12, y:11}, {x:13, y:11}, {x:13, y:6},
    // O
    {x:15, y:8}, {x:15, y:9}, {x:15, y:10}, {x:16, y:7}, {x:17, y:7}, {x:18, y:8}, {x:18, y:9}, {x:18, y:10}, {x:17, y:11}, {x:16, y:11}
];

function openEnvelope() {
  if (opened) return;
  opened = true;

  const env = document.getElementById("envelope");
  const container = document.getElementById("sheepContainer");
  const hint = document.getElementById("hint");
  
  env.classList.add("open");
  hint.innerText = "🐑 Đang dàn quân...";

  const startX = window.innerWidth / 2;
  const startY = window.innerHeight / 2;
  
  // Kích thước mỗi ô chữ
  const spacing = 22; 
  const offsetX = (window.innerWidth - (30 * spacing)) / 2;
  const offsetY = (window.innerHeight - (12 * spacing)) / 2;

  nameMap.forEach((pos, index) => {
    setTimeout(() => {
      const s = document.createElement("div");
      s.className = "sheep jumping";
      s.innerText = Math.random() > 0.5 ? "🐑" : "🐏";
      
      // Xuất phát từ tâm phong bì
      s.style.left = startX + "px";
      s.style.top = startY + "px";
      
      container.appendChild(s);

      // Chạy đến vị trí chữ sau một nhịp nhỏ
      setTimeout(() => {
        s.style.left = (offsetX + pos.x * spacing) + "px";
        s.style.top = (offsetY + pos.y * spacing) + "px";
      }, 50);
      
      // Chỉnh tốc độ nhảy ngẫu nhiên cho tự nhiên
      s.style.animationDuration = (0.6 + Math.random() * 0.4) + "s";
    }, index * 20); // Tạo hiệu ứng đàn cừu chạy ra từng con
  });

  // Ẩn bức thư bên trong
  setTimeout(() => {
    document.getElementById("letter").style.opacity = "0";
  }, 500);
}
</script>

</body>
</html>
