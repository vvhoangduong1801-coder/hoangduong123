<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sheep Letter</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #f5ede0, #faf3e8, #ede8d8);
  font-family: Georgia, serif;
  overflow: hidden;
}

/* Envelope */
.envelope {
  width: 320px;
  height: 210px;
  position: relative;
  cursor: pointer;
  transition: 0.2s;
}

.envelope:hover {
  transform: scale(1.05);
}

.body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(160deg, #f0dfc0, #e8d0a5);
  border: 2px solid #c9a870;
  border-radius: 16px;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 105px;
  background: #e4c98e;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  border-bottom: 2px solid #c9a870;
}

/* Letter */
.letter {
  position: absolute;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  width: 220px;
  height: 140px;
  background: #fff9f0;
  border: 1px solid #ddc89a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  animation: fadeOut 1s forwards;
}

/* Sheep */
.sheep {
  position: absolute;
  font-size: 2.5rem;
  animation: jump 1s infinite ease-in-out;
}

@keyframes jump {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}

@keyframes fadeOut {
  0% { opacity: 1; transform: translate(-50%,0); }
  100% { opacity: 0; transform: translate(-50%,-80px); }
}

</style>
</head>

<body>

<h2>You've Got Mail</h2>
<p id="hint">Click the envelope</p>

<div class="envelope" onclick="openEnvelope()">
  <div class="body"></div>
  <div class="flap"></div>
  <div id="letter" class="letter">🐑🐏🐑</div>
</div>

<div id="sheepContainer"></div>

<script>

let opened = false;

function openEnvelope() {
  if (opened) return;
  opened = true;

  document.getElementById("hint").innerText = "🐑 Cừu đang tràn ra...";

  // tạo cừu
  for (let i = 0; i < 25; i++) {
    let s = document.createElement("div");
    s.className = "sheep";
    s.innerText = Math.random() > 0.5 ? "🐑" : "🐏";

    s.style.left = Math.random() * 100 + "vw";
    s.style.top = Math.random() * 100 + "vh";
    s.style.animationDuration = (0.5 + Math.random()) + "s";

    document.getElementById("sheepContainer").appendChild(s);
  }

  // ẩn lá thư
  setTimeout(() => {
    document.getElementById("letter").style.display = "none";
  }, 800);
}

</script>

</body>
</html>
